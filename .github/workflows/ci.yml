name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The repo is named anki-ai-field-filler but the Python package is
# ai_field_filler.  We symlink the checkout so imports resolve.
env:
  PYTHONPATH: ${{ github.workspace }}/..

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff mypy

      - name: Symlink repo as ai_field_filler
        run: ln -sfn "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/../ai_field_filler"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: cd "$GITHUB_WORKSPACE/.." && mypy --config-file ai_field_filler/pyproject.toml ai_field_filler

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest

      - name: Symlink repo as ai_field_filler
        run: ln -sfn "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/../ai_field_filler"

      - name: Run tests
        run: python -m pytest tests/ -v
