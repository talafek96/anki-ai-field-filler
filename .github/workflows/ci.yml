name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --group dev

      # The repo is anki-ai-field-filler but imports need ai_field_filler.
      # Symlink + PYTHONPATH so both tools and imports resolve correctly.
      - name: Setup package path
        run: |
          ln -sfn "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/../ai_field_filler"
          echo "PYTHONPATH=$GITHUB_WORKSPACE/.." >> "$GITHUB_ENV"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy --package ai_field_filler

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Setup package path
        run: |
          ln -sfn "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/../ai_field_filler"
          echo "PYTHONPATH=$GITHUB_WORKSPACE/.." >> "$GITHUB_ENV"

      - name: Run tests
        run: uv run pytest tests/ -v
