name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute and push version tag
        id: tag
        run: |
          TODAY=$(date -u +%Y.%m.%d)
          EXISTING=$(git tag -l "v${TODAY}" "v${TODAY}-*" | sort -V)
          if [ -z "$EXISTING" ]; then
            TAG="v${TODAY}"
          else
            LAST=$(echo "$EXISTING" | tail -1)
            if [ "$LAST" = "v${TODAY}" ]; then
              TAG="v${TODAY}-1"
            else
              N=$(echo "$LAST" | sed "s/v${TODAY}-//")
              TAG="v${TODAY}-$((N + 1))"
            fi
          fi
          echo "Tagging: $TAG"
          git tag "$TAG"
          git push origin "$TAG"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .ankiaddon package
        run: python build.py

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.version }}" \
            anki-ai-filler.ankiaddon \
            --title "${{ steps.tag.outputs.version }}" \
            --generate-notes
