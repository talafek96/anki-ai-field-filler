[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "F403",  # `from aqt.qt import *` — required by Anki addon convention
    "F405",  # names from star imports — consequence of F403
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]  # allow long lines in tests

[tool.ruff.lint.isort]
known-first-party = ["ai_field_filler"]
known-third-party = ["aqt", "anki", "pytest"]

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
warn_unused_configs = true
disallow_untyped_defs = false
warn_return_any = false
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = "ai_field_filler.ui.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "ai_field_filler.editor_hooks"
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
